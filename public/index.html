<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mur de Post-it 2.0</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Caveat:wght@500;700&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- 3D Scene Background -->
  <div class="bg-scene" aria-hidden="true">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <!-- Toast container -->
  <div id="toast-container" aria-live="polite"></div>

  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <div class="logo-mark">
          <span>📌</span>
        </div>
        <div class="logo-text-wrap">
          <span class="logo-text">PostWall</span>
          <span class="logo-badge">2.0</span>
        </div>
      </div>
      <div class="header-actions">
        <div id="post-count" class="post-count">
          <span class="post-count-dot"></span>
          <span id="post-count-num">0</span> posts
        </div>
        <button id="theme-toggle" class="icon-btn" title="Basculer le thème" aria-label="Basculer le thème">
          <span class="theme-icon">🌙</span>
        </button>
        <button id="open-modal-btn" class="btn btn-primary">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Nouveau Post
        </button>
      </div>
    </div>
  </header>

  <!-- Toolbar -->
  <section class="toolbar">
    <div class="toolbar-inner">
      <div class="search-wrap">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="search-input" type="text" placeholder="Rechercher un post..." autocomplete="off" />
        <button id="clear-search" class="clear-btn hidden" title="Effacer">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="filters">
        <input id="filter-author" type="text" placeholder="👤 Auteur..." />
        <select id="filter-tag">
          <option value="">🏷 Catégorie</option>
          <option value="idée">💡 Idée</option>
          <option value="bug">🐛 Bug</option>
          <option value="todo">✅ Todo</option>
          <option value="important">🔥 Important</option>
          <option value="question">❓ Question</option>
        </select>
        <select id="filter-date">
          <option value="">� Période</option>
          <option value="today">Aujourd'hui</option>
          <option value="week">Cette semaine</option>
          <option value="month">Ce mois</option>
        </select>
        <button id="filter-btn" class="btn btn-filter">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
          Filtrer
        </button>
        <button id="reset-btn" class="btn btn-ghost">Réinitialiser</button>
      </div>
    </div>
  </section>

  <!-- Main board -->
  <main class="board-container">
    <div id="loading-spinner" class="spinner-wrap hidden">
      <div class="spinner-ring"></div>
      <span class="spinner-text">Chargement...</span>
    </div>
    <div id="posts-grid" class="posts-grid"></div>
    <div id="empty-state" class="empty-state hidden">
      <div class="empty-illustration">
        <div class="empty-card empty-card-1"></div>
        <div class="empty-card empty-card-2"></div>
        <div class="empty-card empty-card-3"></div>
        <span class="empty-emoji">✨</span>
      </div>
      <h3>Aucun post pour l'instant</h3>
      <p>Soyez le premier à partager une idée sur ce mur !</p>
      <button class="btn btn-primary" id="empty-add-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Créer le premier post
      </button>
    </div>
    <div id="pagination" class="pagination hidden"></div>
  </main>

  <!-- Create / Edit Modal -->
  <div id="post-modal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title-wrap">
          <div class="modal-icon">📝</div>
          <h2 id="modal-title">Nouveau Post-it</h2>
        </div>
        <button class="icon-btn" id="close-modal-btn" aria-label="Fermer">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <form id="post-form" novalidate>
        <input type="hidden" id="edit-post-id" />
        <div class="form-row">
          <div class="form-group">
            <label for="post-author">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              Auteur <span class="required">*</span>
            </label>
            <input type="text" id="post-author" placeholder="Votre nom..." maxlength="50" required />
          </div>
          <div class="form-group">
            <label for="post-tag">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
              Catégorie
            </label>
            <select id="post-tag">
              <option value="">Aucune</option>
              <option value="idée">💡 Idée</option>
              <option value="bug">🐛 Bug</option>
              <option value="todo">✅ Todo</option>
              <option value="important">🔥 Important</option>
              <option value="question">❓ Question</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label for="post-content">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            Contenu <span class="required">*</span>
          </label>
          <textarea id="post-content" placeholder="Écrivez votre note ici..." maxlength="500" rows="4" required></textarea>
          <div class="char-bar">
            <div class="char-bar-fill" id="char-bar-fill"></div>
          </div>
          <span class="char-count"><span id="char-counter">0</span> / 500</span>
        </div>
        <div class="form-group">
          <label>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4"/></svg>
            Couleur du post-it
          </label>
          <div class="color-picker">
            <button type="button" class="color-swatch active" data-color="#fef08a" style="background:#fef08a" title="Jaune"></button>
            <button type="button" class="color-swatch" data-color="#86efac" style="background:#86efac" title="Vert"></button>
            <button type="button" class="color-swatch" data-color="#93c5fd" style="background:#93c5fd" title="Bleu"></button>
            <button type="button" class="color-swatch" data-color="#f9a8d4" style="background:#f9a8d4" title="Rose"></button>
            <button type="button" class="color-swatch" data-color="#fdba74" style="background:#fdba74" title="Orange"></button>
            <button type="button" class="color-swatch" data-color="#c4b5fd" style="background:#c4b5fd" title="Violet"></button>
            <button type="button" class="color-swatch" data-color="#6ee7b7" style="background:#6ee7b7" title="Menthe"></button>
            <button type="button" class="color-swatch" data-color="#fca5a5" style="background:#fca5a5" title="Corail"></button>
          </div>
          <input type="hidden" id="post-color" value="#fef08a" />
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-ghost" id="cancel-modal-btn">Annuler</button>
          <button type="submit" class="btn btn-primary" id="submit-post-btn">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            Publier
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- Comment Modal -->
  <div id="comment-modal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="comment-modal-title">
    <div class="modal modal-comments">
      <div class="modal-header">
        <div class="modal-title-wrap">
          <div class="modal-icon">💬</div>
          <h2 id="comment-modal-title">Commentaires</h2>
        </div>
        <button class="icon-btn" id="close-comment-modal" aria-label="Fermer">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div id="comments-list" class="comments-list"></div>
      <form id="comment-form" class="comment-form" novalidate>
        <input type="hidden" id="comment-post-id" />
        <input type="text" id="comment-author" placeholder="Votre nom (optionnel)" maxlength="50" />
        <div class="comment-input-row">
          <input type="text" id="comment-content" placeholder="Ajouter un commentaire..." maxlength="300" required />
          <button type="submit" class="btn btn-primary btn-send">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
